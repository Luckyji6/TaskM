<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 — TaskM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="/assets/css/app.css?v=3">
    <style>
        /* 强制覆盖 Materialize 导航默认背景 */
        nav.app-nav,
        nav.app-nav .nav-wrapper {
            background: rgba(243, 239, 232, 0.85) !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
<nav class="app-nav">
    <div class="nav-shell">
        <a href="/pages/dashboard.html" class="brand-logo"><span class="brand-mark">Task</span>M</a>
        <div class="nav-links hide-on-med-and-down">
            <a href="/pages/dashboard.html" class="nav-link active"><i class="material-icons">apps</i>全部任务</a>
            <a href="/pages/myday.html" class="nav-link"><i class="material-icons">wb_sunny</i>我的一天</a>
            <a href="#" class="nav-link nav-user" id="logoutBtn"><i class="material-icons">logout</i><span id="navUsername">...</span></a>
        </div>
        <a href="#" class="sidenav-trigger" data-target="mobile-nav"><i class="material-icons" style="color:var(--text)">menu</i></a>
    </div>
</nav>

<ul class="sidenav" id="mobile-nav">
    <li><a href="/pages/dashboard.html"><i class="material-icons left">apps</i>全部任务</a></li>
    <li><a href="/pages/myday.html"><i class="material-icons left">wb_sunny</i>我的一天</a></li>
    <li><a href="#" id="logoutBtnMobile"><i class="material-icons left">logout</i>退出</a></li>
</ul>

<main class="page">
    <div class="shell">
        <section class="hero">
            <div class="hero-card">
                <div class="hero-eyebrow"><i class="material-icons" style="font-size:16px;color:var(--primary)">schedule</i>今日视图</div>
                <h1 class="hero-title">你好，<span id="greetName">...</span></h1>
                <p class="hero-desc" id="taskSummary">加载中...</p>
                <div class="hero-meta">
                    <div class="metric-pill">
                        <span class="metric-label">当前排序</span>
                        <span class="metric-value" id="currentSortText">最新</span>
                    </div>
                    <div class="metric-pill">
                        <span class="metric-label">任务状态</span>
                        <span class="metric-value" id="taskStatusText">同步中</span>
                    </div>
                </div>
            </div>
            <div class="hero-side">
                <div>
                    <div class="hero-eyebrow"><i class="material-icons" style="font-size:16px;color:var(--primary)">view_in_ar</i>概览</div>
                    <div class="stat-number" id="taskCountHero">0</div>
                    <div class="stat-caption">把任务、进度和每日记录集中在一个清晰的列表里。</div>
                </div>
                <a href="/pages/myday.html" class="btn btn-outline waves-effect">打开我的一天</a>
            </div>
        </section>

        <section>
            <div class="page-toolbar">
                <div>
                    <h2 class="section-title">任务列表</h2>
                    <p class="section-subtitle">保留最重要的信息，只显示真正需要看的内容。</p>
                </div>
                <div class="segmented">
                    <div class="sort-tab active" data-sort="created_at"><i class="material-icons">schedule</i>最新</div>
                    <div class="sort-tab" data-sort="category"><i class="material-icons">folder</i>类别</div>
                    <div class="sort-tab" data-sort="ddl"><i class="material-icons">event</i>DDL</div>
                    <div class="sort-tab" data-sort="progress"><i class="material-icons">trending_up</i>进度</div>
                </div>
            </div>
            <div class="task-grid" id="taskList">
                <div class="loading-state empty-state">
                    <i class="material-icons" style="color:var(--text-muted)">hourglass_empty</i>
                    <p><strong>正在加载任务</strong></p>
                    <p>请稍候。</p>
                </div>
            </div>
        </section>
    </div>
</main>

<a class="btn-floating btn-large fab-btn waves-effect waves-light" id="fabBtn">
    <i class="material-icons">add</i>
</a>

<div id="createModal" class="modal">
    <div class="modal-content">
        <h5 class="modal-title">新建任务</h5>
        <div class="input-field">
            <input type="text" id="newTitle" maxlength="200">
            <label for="newTitle">任务标题</label>
        </div>
        <div class="input-field">
            <textarea id="newDesc" class="materialize-textarea"></textarea>
            <label for="newDesc">任务描述</label>
        </div>
        <div class="row" style="margin-bottom:0">
            <div class="col s12 m6">
                <div class="input-field">
                    <input type="text" id="newCategory" list="categoryList" autocomplete="off">
                    <label for="newCategory">类别</label>
                    <datalist id="categoryList"></datalist>
                </div>
            </div>
            <div class="col s12 m6">
                <div class="input-field">
                    <input type="datetime-local" id="newDdl">
                    <label for="newDdl" class="active">DDL</label>
                </div>
            </div>
        </div>
        <div class="input-field">
            <input type="text" id="newTags" placeholder="用逗号分隔，如 工作,重要">
            <label for="newTags" class="active">标签</label>
        </div>
        <div class="form-error" id="createError"></div>
    </div>
    <div class="modal-footer">
        <a href="#!" class="modal-close btn btn-outline waves-effect">取消</a>
        <button class="btn btn-primary waves-effect" id="createSubmitBtn">创建</button>
    </div>
</div>

<div id="snackbar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="/assets/js/app.js"></script>
<script>
let currentSort = 'created_at';
let allTasks = [];

document.addEventListener('DOMContentLoaded', async () => {
    M.AutoInit();

    const auth = await fetch('/api/auth/check.php');
    if (!auth.ok) {
        window.location.href = '/pages/login.html';
        return;
    }

    const { user } = await auth.json();
    document.getElementById('navUsername').textContent = user.username;
    document.getElementById('greetName').textContent = user.username;

    await loadTasks();
    await loadCategories();

    document.querySelectorAll('.sort-tab').forEach((tab) => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.sort-tab').forEach((item) => item.classList.remove('active'));
            tab.classList.add('active');
            currentSort = tab.dataset.sort;
            document.getElementById('currentSortText').textContent = sortLabel(currentSort);
            loadTasks(currentSort);
        });
    });

    document.getElementById('fabBtn').addEventListener('click', () => {
        M.Modal.getInstance(document.getElementById('createModal')).open();
    });

    document.getElementById('createSubmitBtn').addEventListener('click', createTask);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('logoutBtnMobile')?.addEventListener('click', logout);
});

function sortLabel(sort) {
    const map = {
        created_at: '最新',
        category: '类别',
        ddl: 'DDL',
        progress: '进度'
    };
    return map[sort] || '最新';
}

async function loadTasks(sort = 'created_at') {
    try {
        const data = await apiGet(`/api/tasks/list.php?sort=${sort}`);
        allTasks = data.tasks || [];
        renderTasks(allTasks, sort);

        const total = allTasks.length;
        const completed = allTasks.filter((task) => task.is_completed == 1).length;
        document.getElementById('taskSummary').textContent = total === 0
            ? '还没有任务，点右下角开始创建。'
            : `共 ${total} 个任务，已完成 ${completed} 个。`;
        document.getElementById('taskCountHero').textContent = String(total);
        document.getElementById('taskStatusText').textContent = completed === total && total > 0 ? '全部完成' : '进行中';
    } catch (e) {
        document.getElementById('taskList').innerHTML = `
            <div class="error-state empty-state">
                <i class="material-icons" style="color:var(--danger)">error_outline</i>
                <p><strong>加载失败</strong></p>
                <p>请刷新后重试。</p>
            </div>`;
    }
}

function renderTasks(tasks, sort) {
    const container = document.getElementById('taskList');
    if (!tasks.length) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="material-icons" style="color:var(--text-muted)">inbox</i>
                <p><strong>还没有任务</strong></p>
                <p>先建一个，再开始推进。</p>
            </div>`;
        return;
    }

    if (sort === 'category') {
        const groups = {};
        tasks.forEach((task) => {
            const key = task.category || '未分类';
            if (!groups[key]) groups[key] = [];
            groups[key].push(task);
        });

        let html = '';
        Object.keys(groups).sort().forEach((category) => {
            html += `<div class="category-group-header"><i class="material-icons" style="font-size:16px">folder</i>${escHtml(category)}</div>`;
            groups[category].forEach((task) => {
                html += renderTaskCard(task);
            });
        });
        container.innerHTML = html;
    } else {
        container.innerHTML = tasks.map(renderTaskCard).join('');
    }

    container.querySelectorAll('.task-card').forEach((card) => {
        card.addEventListener('click', () => {
            window.location.href = `/pages/task-detail.html?id=${card.dataset.id}`;
        });
    });
}

function renderTaskCard(task) {
    const tags = Array.isArray(task.tags) ? task.tags : [];
    const progress = parseInt(task.progress, 10) || 0;
    const completedBadge = task.is_completed == 1
        ? '<span class="chip completed"><i class="material-icons" style="font-size:14px">check</i>已完成</span>'
        : '';
    const categoryHtml = task.category
        ? `<span><i class="material-icons" style="font-size:15px">folder</i>${escHtml(task.category)}</span>`
        : '';
    const ddlHtml = task.ddl
        ? `<span style="${ddlClass(task.ddl)}"><i class="material-icons" style="font-size:15px">event</i>${formatDate(task.ddl)}</span>`
        : '';
    const tagsHtml = tags.map((tag) => `<span class="chip tag">${escHtml(tag)}</span>`).join('');
    const commitHtml = task.last_commit_content
        ? `<div class="task-last-commit">${escHtml(task.last_commit_content)}</div>`
        : '';

    return `
        <article class="task-card" data-id="${task.id}">
            <div class="task-head">
                <h3 class="task-title">${escHtml(task.title)}</h3>
                ${completedBadge}
            </div>
            <div class="task-meta">${categoryHtml}${ddlHtml}</div>
            ${tagsHtml ? `<div class="task-chips">${tagsHtml}</div>` : ''}
            ${commitHtml}
            <div class="progress-wrap">
                <div class="progress-label"><span>整体进度</span><span>${progress}%</span></div>
                <div class="progress ${progress === 100 ? 'progress-100' : ''}">
                    <div class="determinate" style="width:${progress}%"></div>
                </div>
            </div>
        </article>`;
}

async function loadCategories() {
    try {
        const data = await apiGet('/api/meta/categories.php');
        const list = document.getElementById('categoryList');
        list.innerHTML = '';
        (data.categories || []).forEach((category) => {
            const option = document.createElement('option');
            option.value = category;
            list.appendChild(option);
        });
    } catch (e) {}
}

async function createTask() {
    const errEl = document.getElementById('createError');
    const btn = document.getElementById('createSubmitBtn');
    errEl.style.display = 'none';

    const title = document.getElementById('newTitle').value.trim();
    const desc = document.getElementById('newDesc').value.trim();
    const category = document.getElementById('newCategory').value.trim();
    const ddl = document.getElementById('newDdl').value;
    const tagsRaw = document.getElementById('newTags').value;
    const tags = tagsRaw ? tagsRaw.split(',').map((item) => item.trim()).filter(Boolean) : [];

    if (!title) {
        errEl.textContent = '请填写任务标题';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = '创建中...';

    try {
        const data = await apiPost('/api/tasks/create.php', {
            title,
            description: desc,
            category,
            tags,
            ddl
        });

        if (data.success) {
            M.Modal.getInstance(document.getElementById('createModal')).close();
            ['newTitle', 'newDesc', 'newCategory', 'newDdl', 'newTags'].forEach((id) => {
                document.getElementById(id).value = '';
            });
            M.updateTextFields();
            showToast('任务已创建');
            await loadTasks(currentSort);
            await loadCategories();
        } else {
            errEl.textContent = data.error || '创建失败';
            errEl.style.display = 'block';
        }
    } catch (e) {
        errEl.textContent = '网络错误，请重试';
        errEl.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = '创建';
}

async function logout() {
    await apiPost('/api/auth/logout.php', {});
    window.location.href = '/pages/login.html';
}

function escHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
