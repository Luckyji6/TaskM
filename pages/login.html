<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - TaskM</title>
    <link rel="icon" type="image/png" href="/assets/pic/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="/assets/css/app.css?v=5">
    <script>
        window.AliyunCaptchaConfig = {
            region: "cn",
            prefix: "rcp0uv",
        };
    </script>
    <script type="text/javascript" src="https://o.alicdn.com/captcha-frontend/aliyunCaptcha/AliyunCaptcha.js"></script>
</head>
<body>
<main class="auth-page">
    <section class="auth-panel">
        <div class="auth-side">
            <div class="auth-badge">TaskM</div>
            <h1 class="auth-title" data-i18n-html="login.heroTitle">回到你的<span>任务节奏</span></h1>
            <p class="auth-copy" data-i18n="login.heroCopy">用更安静、更清晰的界面查看任务、记录进度，把每天真正完成的事情留下来。</p>
            <ul class="auth-points">
                <li><i class="material-icons">check_circle</i><span data-i18n="login.point1">集中查看任务、类别、DDL 和进度</span></li>
                <li><i class="material-icons">check_circle</i><span data-i18n="login.point2">按天推进，减少上下文切换</span></li>
                <li><i class="material-icons">check_circle</i><span data-i18n="login.point3">所有记录都直接保存到你的任务历史</span></li>
            </ul>
        </div>
        <div class="auth-form-wrap">
            <h2 class="auth-form-title" data-i18n="auth.loginTitle">登录</h2>
            <p class="auth-form-subtitle" data-i18n="login.formSubtitle">输入账号后继续。</p>
            <form id="loginForm" novalidate>
                <div class="input-field">
                    <i class="material-icons prefix">person</i>
                    <input type="text" id="account" class="validate" autocomplete="username" required>
                    <label for="account" data-i18n="auth.account">用户名 / 邮箱</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">lock</i>
                    <input type="password" id="password" class="validate" autocomplete="current-password" required>
                    <label for="password" data-i18n="auth.password">密码</label>
                </div>
                <div id="captcha-element"></div>
                <div class="form-error" id="errorMsg"></div>
                <button type="button" class="btn btn-primary waves-effect auth-submit" id="submitBtn" data-i18n="auth.loginSubmit">登录</button>
            </form>
            <div class="auth-switch"><span data-i18n="auth.noAccount">还没有账号？</span><a href="/pages/register.html" data-i18n="auth.goRegister">立即注册</a></div>
        </div>
    </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="/assets/js/app.js"></script>
<script>
TaskM.setDocumentTitle(TaskM.t('login.pageTitle'));
TaskM.translatePage();

(async () => {
    const res = await fetch('/api/auth/check.php', {
        headers: {
            'Accept-Language': TaskM.getCurrentLanguage(),
            'X-TaskM-Lang': TaskM.getCurrentLanguage(),
        },
    });
    if (res.ok) window.location.href = '/pages/dashboard.html';
})();

let captchaInstance = null;
let formData = null;

window.initAliyunCaptcha({
    SceneId: 'q6rzke7a',
    mode: 'popup',
    element: '#captcha-element',
    button: '#submitBtn',
    captchaVerifyCallback: async function(captchaVerifyParam) {
        const errEl = document.getElementById('errorMsg');
        errEl.style.display = 'none';

        const account = document.getElementById('account').value.trim();
        const password = document.getElementById('password').value;

        if (!account || !password) {
            errEl.textContent = TaskM.t('auth.incomplete');
            errEl.style.display = 'block';
            return { captchaResult: false, bizResult: false };
        }

        try {
            const hashClient = await sha256(password);
            const data = await apiPost('/api/auth/login.php', { 
                account, 
                hash_client: hashClient,
                captchaVerifyParam: captchaVerifyParam
            });

            if (!data.success && data.captchaVerifyResult !== false) {
                errEl.textContent = data.error || TaskM.t('auth.loginFailed');
                errEl.style.display = 'block';
            }

            return { 
                captchaResult: data.captchaVerifyResult === false ? false : true,
                bizResult: data.success === true
            };
        } catch (err) {
            errEl.textContent = TaskM.t('common.networkRetry');
            errEl.style.display = 'block';
            return { captchaResult: false, bizResult: false };
        }
    },
    onBizResultCallback: function(bizResult) {
        const errEl = document.getElementById('errorMsg');
        if (bizResult === true) {
            window.location.href = '/pages/dashboard.html';
        } else {
            if (!errEl.textContent) {
                errEl.textContent = TaskM.t('auth.loginRetry');
                errEl.style.display = 'block';
            }
        }
    },
    getInstance: function(instance) {
        captchaInstance = instance;
    },
    slideStyle: { width: 360, height: 40 },
    language: TaskM.getCaptchaLanguage(),
});

document.getElementById('submitBtn').addEventListener('click', function(e) {
    const account = document.getElementById('account').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('errorMsg');
    
    if (!account || !password) {
        errEl.textContent = TaskM.t('auth.incomplete');
        errEl.style.display = 'block';
        return;
    }
    errEl.textContent = '';
    errEl.style.display = 'none';
});
</script>
</body>
</html>
