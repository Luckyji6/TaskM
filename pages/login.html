<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — TaskM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="/assets/css/app.css?v=5">
</head>
<body>
<main class="auth-page">
    <section class="auth-panel">
        <div class="auth-side">
            <div class="auth-badge">TaskM</div>
            <h1 class="auth-title">回到你的<span>任务节奏</span></h1>
            <p class="auth-copy">用更安静、更清晰的界面查看任务、记录进度，把每天真正完成的事情留下来。</p>
            <ul class="auth-points">
                <li><i class="material-icons">check_circle</i><span>集中查看任务、类别、DDL 和进度</span></li>
                <li><i class="material-icons">check_circle</i><span>按天推进，减少上下文切换</span></li>
                <li><i class="material-icons">check_circle</i><span>所有记录都直接保存到你的任务历史</span></li>
            </ul>
        </div>
        <div class="auth-form-wrap">
            <h2 class="auth-form-title">登录</h2>
            <p class="auth-form-subtitle">输入账号后继续。</p>
            <form id="loginForm" novalidate>
                <div class="input-field">
                    <i class="material-icons prefix">person</i>
                    <input type="text" id="account" class="validate" autocomplete="username" required>
                    <label for="account">用户名 / 邮箱</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">lock</i>
                    <input type="password" id="password" class="validate" autocomplete="current-password" required>
                    <label for="password">密码</label>
                </div>
                <div class="form-error" id="errorMsg"></div>
                <button type="submit" class="btn btn-primary waves-effect auth-submit" id="submitBtn">登录</button>
            </form>
            <div class="auth-switch">还没有账号？<a href="/pages/register.html">立即注册</a></div>
        </div>
    </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="/assets/js/app.js"></script>
<script>
(async () => {
    const res = await fetch('/api/auth/check.php');
    if (res.ok) window.location.href = '/pages/dashboard.html';
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');
    errEl.style.display = 'none';

    const account = document.getElementById('account').value.trim();
    const password = document.getElementById('password').value;

    if (!account || !password) {
        errEl.textContent = '请填写完整信息';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
        const hashClient = await sha256(password);
        const data = await apiPost('/api/auth/login.php', { account, hash_client: hashClient });

        if (data.success) {
            window.location.href = '/pages/dashboard.html';
        } else {
            errEl.textContent = data.error || '登录失败';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '登录';
        }
    } catch (err) {
        errEl.textContent = '网络错误，请重试';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登录';
    }
});
</script>
</body>
</html>
