<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 — TaskM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="/assets/css/app.css?v=3">
</head>
<body>
<main class="auth-page">
    <section class="auth-panel">
        <div class="auth-side">
            <div class="auth-badge">TaskM</div>
            <h1 class="auth-title">建立你的<span>任务空间</span></h1>
            <p class="auth-copy">注册后就可以开始管理任务、记录每日进度，并用更简洁的方式跟踪长期目标。</p>
            <ul class="auth-points">
                <li><i class="material-icons">check_circle</i><span>新建任务时支持类别、标签和 DDL</span></li>
                <li><i class="material-icons">check_circle</i><span>我的一天帮助你快速推进未完成事项</span></li>
                <li><i class="material-icons">check_circle</i><span>任务详情页可以保留完整提交历史</span></li>
            </ul>
        </div>
        <div class="auth-form-wrap">
            <h2 class="auth-form-title">注册</h2>
            <p class="auth-form-subtitle">创建账号后立即开始使用。</p>
            <form id="registerForm" novalidate>
                <div class="input-field">
                    <i class="material-icons prefix">person</i>
                    <input type="text" id="username" class="validate" autocomplete="username" required>
                    <label for="username">用户名</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">email</i>
                    <input type="email" id="email" class="validate" autocomplete="email" required>
                    <label for="email">邮箱</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">lock</i>
                    <input type="password" id="password" class="validate" autocomplete="new-password" required>
                    <label for="password">密码（至少 6 位）</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">lock_outline</i>
                    <input type="password" id="passwordConfirm" class="validate" autocomplete="new-password" required>
                    <label for="passwordConfirm">确认密码</label>
                </div>
                <div class="form-error" id="errorMsg"></div>
                <button type="submit" class="btn btn-primary waves-effect auth-submit" id="submitBtn">注册</button>
            </form>
            <div class="auth-switch">已有账号？<a href="/pages/login.html">立即登录</a></div>
        </div>
    </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="/assets/js/app.js"></script>
<script>
(async () => {
    const res = await fetch('/api/auth/check.php');
    if (res.ok) window.location.href = '/pages/dashboard.html';
})();

document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');
    errEl.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('passwordConfirm').value;

    if (!username || !email || !password) {
        errEl.textContent = '请填写完整信息';
        errEl.style.display = 'block';
        return;
    }
    if (username.length < 2) {
        errEl.textContent = '用户名至少需要 2 个字符';
        errEl.style.display = 'block';
        return;
    }
    if (password.length < 6) {
        errEl.textContent = '密码至少需要 6 位';
        errEl.style.display = 'block';
        return;
    }
    if (password !== passwordConfirm) {
        errEl.textContent = '两次密码输入不一致';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = '注册中...';

    try {
        const hashClient = await sha256(password);
        const data = await apiPost('/api/auth/register.php', { username, email, hash_client: hashClient });

        if (data.success) {
            window.location.href = '/pages/dashboard.html';
        } else {
            errEl.textContent = data.error || '注册失败';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '注册';
        }
    } catch (err) {
        errEl.textContent = '网络错误，请重试';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '注册';
    }
});
</script>
</body>
</html>
