<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - TaskM</title>
    <link rel="icon" type="image/png" href="/assets/pic/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="/assets/css/app.css?v=5">
    <script>
        window.AliyunCaptchaConfig = {
            region: "cn",
            prefix: "rcp0uv",
        };
    </script>
    <script type="text/javascript" src="https://o.alicdn.com/captcha-frontend/aliyunCaptcha/AliyunCaptcha.js"></script>
</head>
<body>
<main class="auth-page">
    <section class="auth-panel">
        <div class="auth-side">
            <div class="auth-badge">TaskM</div>
            <h1 class="auth-title" data-i18n-html="register.heroTitle">建立你的<span>任务空间</span></h1>
            <p class="auth-copy" data-i18n="register.heroCopy">注册后就可以开始管理任务、记录每日进度，并用更简洁的方式跟踪长期目标。</p>
            <ul class="auth-points">
                <li><i class="material-icons">check_circle</i><span data-i18n="register.point1">新建任务时支持类别、标签和 DDL</span></li>
                <li><i class="material-icons">check_circle</i><span data-i18n="register.point2">我的一天帮助你快速推进未完成事项</span></li>
                <li><i class="material-icons">check_circle</i><span data-i18n="register.point3">任务详情页可以保留完整提交历史</span></li>
            </ul>
        </div>
        <div class="auth-form-wrap">
            <h2 class="auth-form-title" data-i18n="auth.registerTitle">注册</h2>
            <p class="auth-form-subtitle" data-i18n="register.formSubtitle">创建账号后立即开始使用。</p>
            <form id="registerForm" novalidate>
                <div class="input-field">
                    <i class="material-icons prefix">person</i>
                    <input type="text" id="username" class="validate" autocomplete="username" required>
                    <label for="username" data-i18n="auth.username">用户名</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">email</i>
                    <input type="email" id="email" class="validate" autocomplete="email" required>
                    <label for="email" data-i18n="auth.email">邮箱</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">lock</i>
                    <input type="password" id="password" class="validate" autocomplete="new-password" required>
                    <label for="password" data-i18n="auth.passwordMin">密码（至少 6 位）</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">lock_outline</i>
                    <input type="password" id="passwordConfirm" class="validate" autocomplete="new-password" required>
                    <label for="passwordConfirm" data-i18n="auth.confirmPassword">确认密码</label>
                </div>
                <div id="captcha-element"></div>
                <div class="form-error" id="errorMsg"></div>
                <button type="button" class="btn btn-primary waves-effect auth-submit" id="submitBtn" data-i18n="auth.registerSubmit">注册</button>
            </form>
            <div class="auth-switch"><span data-i18n="auth.hasAccount">已有账号？</span><a href="/pages/login.html" data-i18n="auth.goLogin">立即登录</a></div>
        </div>
    </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="/assets/js/app.js"></script>
<script>
TaskM.setDocumentTitle(TaskM.t('register.pageTitle'));
TaskM.translatePage();

(async () => {
    const res = await fetch('/api/auth/check.php', {
        headers: {
            'Accept-Language': TaskM.getCurrentLanguage(),
            'X-TaskM-Lang': TaskM.getCurrentLanguage(),
        },
    });
    if (res.ok) window.location.href = '/pages/dashboard.html';
})();

let captchaInstance = null;

function validateForm() {
    const errEl = document.getElementById('errorMsg');
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('passwordConfirm').value;

    if (!username || !email || !password) {
        errEl.textContent = TaskM.t('auth.incomplete');
        errEl.style.display = 'block';
        return false;
    }
    if (username.length < 2) {
        errEl.textContent = TaskM.t('auth.usernameMin');
        errEl.style.display = 'block';
        return false;
    }
    if (password.length < 6) {
        errEl.textContent = TaskM.t('auth.passwordMinError');
        errEl.style.display = 'block';
        return false;
    }
    if (password !== passwordConfirm) {
        errEl.textContent = TaskM.t('auth.passwordMismatch');
        errEl.style.display = 'block';
        return false;
    }
    errEl.style.display = 'none';
    return true;
}

window.initAliyunCaptcha({
    SceneId: 'q6rzke7a',
    mode: 'popup',
    element: '#captcha-element',
    button: '#submitBtn',
    captchaVerifyCallback: async function(captchaVerifyParam) {
        const errEl = document.getElementById('errorMsg');
        
        if (!validateForm()) {
            return { captchaResult: false, bizResult: false };
        }

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
            const hashClient = await sha256(password);
            const data = await apiPost('/api/auth/register.php', { 
                username, 
                email, 
                hash_client: hashClient,
                captchaVerifyParam: captchaVerifyParam
            });

            if (!data.success && data.captchaVerifyResult !== false) {
                errEl.textContent = data.error || TaskM.t('auth.registerFailed');
                errEl.style.display = 'block';
            }

            return { 
                captchaResult: data.captchaVerifyResult === false ? false : true,
                bizResult: data.success === true
            };
        } catch (err) {
            errEl.textContent = TaskM.t('common.networkRetry');
            errEl.style.display = 'block';
            return { captchaResult: false, bizResult: false };
        }
    },
    onBizResultCallback: function(bizResult) {
        const errEl = document.getElementById('errorMsg');
        if (bizResult === true) {
            window.location.href = '/pages/dashboard.html';
        } else {
            if (!errEl.textContent) {
                errEl.textContent = TaskM.t('auth.registerRetry');
                errEl.style.display = 'block';
            }
        }
    },
    getInstance: function(instance) {
        captchaInstance = instance;
    },
    slideStyle: { width: 360, height: 40 },
    language: TaskM.getCaptchaLanguage(),
});

document.getElementById('submitBtn').addEventListener('click', function(e) {
    validateForm();
});
</script>
</body>
</html>
