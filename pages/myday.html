<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的一天 - TaskM</title>
    <link rel="icon" type="image/png" href="/assets/pic/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="/assets/css/app.css?v=4">
    <style id="myday-stack-style">
        nav.app-nav,
        nav.app-nav .nav-wrapper {
            background: rgba(243, 239, 232, 0.85) !important;
            box-shadow: none !important;
        }

        .myday-card-stack {
            position: relative;
            margin-top: 20px;
            padding: 0 28px 72px 0;
        }

        .myday-deck {
            position: relative;
        }

        .stack-layer,
        .myday-card-main {
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.56);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .stack-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .stack-layer.layer-1 {
            transform: translate(18px, 18px);
            background: rgba(252, 246, 239, 0.9);
            box-shadow: 0 16px 32px rgba(40, 27, 18, 0.08);
            z-index: 1;
        }

        .stack-layer.layer-2 {
            transform: translate(36px, 36px);
            background: rgba(247, 239, 229, 0.78);
            box-shadow: 0 10px 24px rgba(40, 27, 18, 0.06);
            z-index: 0;
        }

        .myday-card-main {
            position: relative;
            z-index: 2;
            background: var(--surface);
            box-shadow: var(--shadow-lg);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes cardSlideOut {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateX(100px) rotate(12deg) scale(0.9);
                opacity: 0;
            }
        }

        @media (max-width: 700px) {
            .myday-card-stack {
                padding-right: 18px;
                padding-bottom: 54px;
            }

            .stack-layer.layer-1 {
                transform: translate(10px, 12px);
            }

            .stack-layer.layer-2 {
                transform: translate(20px, 24px);
            }

            @keyframes cardSlideOut {
                0% {
                    transform: translateY(0) scale(1);
                    opacity: 1;
                }
                100% {
                    transform: translateX(80px) rotate(10deg) scale(0.88);
                    opacity: 0;
                }
            }
        }
    </style>
</head>
<body>
<nav class="app-nav">
    <div class="nav-shell">
        <a href="/pages/dashboard.html" class="brand-logo"><span class="brand-mark">Task</span>M</a>
        <div class="nav-links hide-on-med-and-down">
            <a href="/pages/dashboard.html" class="nav-link"><i class="material-icons">apps</i><span data-i18n="common.allTasks">全部任务</span></a>
            <a href="/pages/myday.html" class="nav-link active"><i class="material-icons">wb_sunny</i><span data-i18n="common.myDay">我的一天</span></a>
            <a href="#" class="nav-link nav-user" id="logoutBtn"><i class="material-icons">logout</i><span id="navUsername">...</span></a>
        </div>
        <a href="#" class="sidenav-trigger" data-target="mobile-nav"><i class="material-icons" style="color:var(--text)">menu</i></a>
    </div>
</nav>

<ul class="sidenav" id="mobile-nav">
    <li><a href="/pages/dashboard.html"><i class="material-icons left">apps</i><span data-i18n="common.allTasks">全部任务</span></a></li>
    <li><a href="/pages/myday.html"><i class="material-icons left">wb_sunny</i><span data-i18n="common.myDay">我的一天</span></a></li>
    <li><a href="#" id="logoutBtnMobile"><i class="material-icons left">logout</i><span data-i18n="common.logout">退出</span></a></li>
</ul>

<main class="page">
    <div class="myday-shell" id="mydayWrapper">
        <div class="loading-state empty-state">
            <i class="material-icons" style="color:var(--text-muted)">hourglass_empty</i>
            <p><strong data-i18n="common.preparingToday">正在准备今日任务</strong></p>
            <p data-i18n="common.loadingPleaseWait">请稍候。</p>
        </div>
    </div>
</main>

<div id="snackbar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="/assets/js/app.js"></script>
<script>
    TaskM.setDocumentTitle(TaskM.t('myday.title'));
    TaskM.translatePage();

    let tasks = [];
    let currentIdx = 0;
    let activePanel = null;
    let isAnimating = false;

    document.addEventListener('DOMContentLoaded', async () => {
        M.AutoInit();

        const auth = await fetch('/api/auth/check.php', {
            headers: {
                'Accept-Language': TaskM.getCurrentLanguage(),
                'X-TaskM-Lang': TaskM.getCurrentLanguage(),
            },
        });
        if (!auth.ok) {
            window.location.href = '/pages/login.html';
            return;
        }

        const { user } = await auth.json();
        document.getElementById('navUsername').textContent = user.username;

        await loadTasks();
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('logoutBtnMobile')?.addEventListener('click', logout);
    });

async function loadTasks() {
    try {
        const data = await apiGet('/api/tasks/list.php?sort=created_at');
        tasks = (data.tasks || []).filter((task) => task.is_completed != 1);
        currentIdx = 0;
        activePanel = null;
        render();
    } catch (e) {
        document.getElementById('mydayWrapper').innerHTML = `
            <div class="error-state empty-state">
                <i class="material-icons" style="color:var(--danger)">error_outline</i>
                <p><strong>${TaskM.t('common.loadFailed')}</strong></p>
                <p>${TaskM.t('common.refreshAndRetry')}</p>
            </div>`;
    }
}

function render() {
    const wrapper = document.getElementById('mydayWrapper');

    if (!tasks.length) {
        wrapper.innerHTML = `
            <div class="myday-done empty-state">
                <i class="material-icons" style="color:var(--success)">check_circle</i>
                <p><strong>${TaskM.t('myday.emptyTitle')}</strong></p>
                <p>${TaskM.t('myday.emptyDesc')}</p>
                <a href="/pages/dashboard.html" class="btn btn-primary waves-effect">${TaskM.t('common.backToDashboard')}</a>
            </div>`;
        return;
    }

    if (currentIdx >= tasks.length) {
        wrapper.innerHTML = `
            <div class="myday-done empty-state">
                <i class="material-icons" style="color:var(--success)">done_all</i>
                <p><strong>${TaskM.t('myday.finishedTitle')}</strong></p>
                <p>${TaskM.t('myday.finishedDesc')}</p>
                <a href="/pages/dashboard.html" class="btn btn-primary waves-effect">${TaskM.t('common.backToDashboard')}</a>
            </div>`;
        return;
    }

    const remainingTasks = tasks.length - currentIdx;
    const task = tasks[currentIdx];
    const tags = Array.isArray(task.tags) ? task.tags : [];
    const progress = parseInt(task.progress, 10) || 0;
    const layerOne = remainingTasks > 1 ? '<div class="stack-layer layer-1" aria-hidden="true"></div>' : '';
    const layerTwo = remainingTasks > 2 ? '<div class="stack-layer layer-2" aria-hidden="true"></div>' : '';

    wrapper.innerHTML = `
        <div class="myday-card-stack">
            <div class="myday-deck">
                ${layerTwo}
                ${layerOne}
                <article class="myday-card myday-card-main" id="activeMydayCard">
                <div class="myday-header">
                    <div>
                        <div class="hero-eyebrow"><i class="material-icons" style="font-size:16px;color:var(--primary)">auto_awesome</i>${TaskM.t('myday.title')}</div>
                        <h1 class="myday-title">${escHtml(task.title)}</h1>
                    </div>
                    <div class="myday-counter"><strong style="color:var(--primary)">${currentIdx + 1}</strong> / ${tasks.length}</div>
                </div>
                <div class="task-meta">
                    ${task.category ? `<span><i class="material-icons" style="font-size:15px">folder</i>${escHtml(task.category)}</span>` : ''}
                    ${task.ddl ? `<span style="${ddlClass(task.ddl)}"><i class="material-icons" style="font-size:15px">event</i>${formatDate(task.ddl)}</span>` : ''}
                </div>
                ${tags.length ? `<div class="task-chips">${tags.map((tag) => `<span class="chip tag">${escHtml(tag)}</span>`).join('')}</div>` : ''}
                ${task.description ? `<p class="myday-desc">${escHtml(task.description)}</p>` : ''}
                <div class="progress-wrap">
                    <div class="progress-label"><span>${TaskM.t('common.currentProgress')}</span><span>${progress}%</span></div>
                    <div class="progress ${progress === 100 ? 'progress-100' : ''}">
                        <div class="determinate" style="width:${progress}%"></div>
                    </div>
                </div>
                <div class="myday-actions">
                    <button class="btn btn-soft waves-effect" id="btnNoProgress">${TaskM.t('myday.noProgress')}</button>
                    <button class="btn btn-primary waves-effect" id="btnCompleted">${TaskM.t('myday.completed')}</button>
                    <button class="btn btn-outline waves-effect" id="btnFollowUp">${TaskM.t('myday.followUp')}</button>
                </div>
                <div id="panelCompleted" class="myday-expand" style="display:none">
                    <p class="expand-title"><i class="material-icons" style="color:var(--success)">check_circle</i>${TaskM.t('myday.completedWhat')}</p>
                    <textarea class="myday-textarea" id="completedContent" placeholder="${escAttr(TaskM.t('myday.completedPlaceholder'))}"></textarea>
                    <div class="panel-actions">
                        <button class="btn btn-outline waves-effect" id="cancelCompleted">${TaskM.t('myday.cancel')}</button>
                        <button class="btn btn-primary waves-effect" id="submitCompleted">${TaskM.t('myday.submitCompleted')}</button>
                    </div>
                </div>
                <div id="panelFollowUp" class="myday-expand" style="display:none">
                    <p class="expand-title"><i class="material-icons" style="color:var(--warning)">trending_up</i>${TaskM.t('myday.followUpTitle')}</p>
                    <textarea class="myday-textarea" id="followUpContent" placeholder="${escAttr(TaskM.t('myday.followUpPlaceholder'))}"></textarea>
                    <div class="progress-input-row">
                        <label for="followUpRange">${TaskM.t('common.overallProgress')}</label>
                        <input type="range" id="followUpRange" min="0" max="100" value="${progress}" step="1">
                        <input type="number" id="followUpNum" min="0" max="100" value="${progress}">
                        <span style="color:var(--text-muted)">%</span>
                    </div>
                    <div class="panel-actions">
                        <button class="btn btn-outline waves-effect" id="cancelFollowUp">${TaskM.t('myday.cancel')}</button>
                        <button class="btn btn-primary waves-effect" id="submitFollowUp">${TaskM.t('myday.submitFollowUp')}</button>
                    </div>
                </div>
                </article>
            </div>
        </div>`;

    const card = document.getElementById('activeMydayCard');
    card.querySelector('#btnNoProgress')?.addEventListener('click', () => submitCommit('no_progress', '', parseInt(tasks[currentIdx].progress, 10) || 0));
    card.querySelector('#btnCompleted')?.addEventListener('click', () => togglePanel('completed'));
    card.querySelector('#btnFollowUp')?.addEventListener('click', () => togglePanel('follow_up'));
    card.querySelector('#cancelCompleted')?.addEventListener('click', () => togglePanel(null));
    card.querySelector('#cancelFollowUp')?.addEventListener('click', () => togglePanel(null));

    card.querySelector('#submitCompleted')?.addEventListener('click', () => {
        const content = document.getElementById('completedContent').value.trim();
        submitCommit('completed', content, 100);
    });

    card.querySelector('#submitFollowUp')?.addEventListener('click', () => {
        const content = document.getElementById('followUpContent').value.trim();
        const progressValue = parseInt(document.getElementById('followUpNum').value, 10) || 0;
        submitCommit('follow_up', content, progressValue);
    });

    card.querySelector('#followUpRange')?.addEventListener('input', (e) => {
        document.getElementById('followUpNum').value = e.target.value;
    });

    card.querySelector('#followUpNum')?.addEventListener('input', (e) => {
        const value = Math.max(0, Math.min(100, parseInt(e.target.value, 10) || 0));
        e.target.value = value;
        document.getElementById('followUpRange').value = value;
    });
}

function togglePanel(panel) {
    activePanel = panel;
    const completedPanel = document.getElementById('panelCompleted');
    const followPanel = document.getElementById('panelFollowUp');
    if (completedPanel) completedPanel.style.display = panel === 'completed' ? 'block' : 'none';
    if (followPanel) followPanel.style.display = panel === 'follow_up' ? 'block' : 'none';
}

async function submitCommit(type, content, progress) {
    if (isAnimating) return;
    
    const task = tasks[currentIdx];
    const btns = ['btnNoProgress', 'btnCompleted', 'btnFollowUp', 'submitCompleted', 'submitFollowUp'];
    btns.forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.disabled = true;
    });

    try {
        const data = await apiPost('/api/commits/create.php', {
            task_id: task.id,
            type,
            content,
            progress
        });

        if (data.success) {
            const labels = {
                no_progress: TaskM.t('commits.noProgressToast'),
                completed: TaskM.t('commits.completedToast'),
                follow_up: TaskM.t('commits.followUpToast')
            };
            showToast(labels[type] || TaskM.t('commits.submitted'));
            
            const topCard = document.getElementById('activeMydayCard');
            if (topCard) {
                isAnimating = true;
                topCard.style.transition = 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                topCard.style.transform = 'translateX(100px) rotate(12deg) scale(0.9)';
                topCard.style.opacity = '0';
                
                await new Promise(resolve => setTimeout(resolve, 400));
                
                currentIdx += 1;
                activePanel = null;
                isAnimating = false;
                render();
            } else {
                currentIdx += 1;
                activePanel = null;
                render();
            }
        } else {
            showToast(data.error || TaskM.t('commits.submitFailed'));
            btns.forEach((id) => {
                const el = document.getElementById(id);
                if (el) el.disabled = false;
            });
        }
    } catch (e) {
        showToast(TaskM.t('common.networkRetry'));
        btns.forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.disabled = false;
        });
    }
}

async function logout() {
    await apiPost('/api/auth/logout.php', {});
    window.location.href = '/pages/login.html';
}

function escHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function escAttr(str) {
    return escHtml(str).replace(/'/g, '&#39;');
}
</script>
</body>
</html>
