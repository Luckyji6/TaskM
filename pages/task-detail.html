<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务详情 - TaskM</title>
    <link rel="icon" type="image/png" href="/assets/pic/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="/assets/css/app.css?v=5">
    <style>
        /* 强制覆盖 Materialize 导航默认背景 */
        nav.app-nav,
        nav.app-nav .nav-wrapper {
            background: rgba(243, 239, 232, 0.85) !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
<nav class="app-nav">
    <div class="nav-shell">
        <a href="/pages/dashboard.html" class="brand-logo"><span class="brand-mark">Task</span>M</a>
        <div class="nav-links hide-on-med-and-down">
            <a href="/pages/dashboard.html" class="nav-link"><i class="material-icons">apps</i><span data-i18n="common.allTasks">全部任务</span></a>
            <a href="/pages/myday.html" class="nav-link"><i class="material-icons">wb_sunny</i><span data-i18n="common.myDay">我的一天</span></a>
            <a href="#" class="nav-link nav-user" id="logoutBtn"><i class="material-icons">logout</i><span id="navUsername">...</span></a>
        </div>
        <a href="#" class="sidenav-trigger" data-target="mobile-nav"><i class="material-icons" style="color:var(--text)">menu</i></a>
    </div>
</nav>

<ul class="sidenav" id="mobile-nav">
    <li><a href="/pages/dashboard.html"><i class="material-icons left">apps</i><span data-i18n="common.allTasks">全部任务</span></a></li>
    <li><a href="/pages/myday.html"><i class="material-icons left">wb_sunny</i><span data-i18n="common.myDay">我的一天</span></a></li>
    <li><a href="#" id="logoutBtnMobile"><i class="material-icons left">logout</i><span data-i18n="common.logout">退出</span></a></li>
</ul>

<main class="page">
    <div class="shell detail-stack" id="detailContainer">
        <div class="loading-state empty-state">
            <i class="material-icons" style="color:var(--text-muted)">hourglass_empty</i>
            <p><strong data-i18n="common.loadingDetail">正在加载详情</strong></p>
            <p data-i18n="common.loadingPleaseWait">请稍候。</p>
        </div>
    </div>
</main>

<div id="snackbar"></div>

<div id="deleteModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center">
    <div style="background:var(--surface);border-radius:10px;padding:24px;max-width:400px;margin:20px;box-shadow:0 4px 20px rgba(0,0,0,0.15)">
        <h3 style="margin:0 0 12px 0;font-size:18px;font-weight:600;color:var(--text)" data-i18n="detail.deleteConfirmTitle">确认删除</h3>
        <p style="margin:0 0 20px 0;color:var(--text-muted);font-size:14px" data-i18n="detail.deleteConfirmDesc">删除后无法恢复，确定要删除这个任务吗？</p>
        <div style="display:flex;gap:12px;justify-content:flex-end">
            <button class="btn btn-outline waves-effect" id="cancelDeleteBtn" data-i18n="detail.deleteCancel">取消</button>
            <button class="btn btn-danger waves-effect" id="confirmDeleteBtn" data-i18n="detail.deleteConfirm">确认删除</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="/assets/js/app.js"></script>
<script>
TaskM.setDocumentTitle(TaskM.t('detail.title'));
TaskM.translatePage();

const TASK_ID = new URLSearchParams(window.location.search).get('id');

document.addEventListener('DOMContentLoaded', async () => {
    M.AutoInit();

    if (!TASK_ID) {
        window.location.href = '/pages/dashboard.html';
        return;
    }

    const auth = await fetch('/api/auth/check.php', {
        headers: {
            'Accept-Language': TaskM.getCurrentLanguage(),
            'X-TaskM-Lang': TaskM.getCurrentLanguage(),
        },
    });
    if (!auth.ok) {
        window.location.href = '/pages/login.html';
        return;
    }

    const { user } = await auth.json();
    document.getElementById('navUsername').textContent = user.username;

    await loadDetail();
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('logoutBtnMobile')?.addEventListener('click', logout);
});

async function loadDetail() {
    try {
        const data = await apiGet(`/api/tasks/detail.php?id=${TASK_ID}`);
        if (!data.success) {
            document.getElementById('detailContainer').innerHTML = `
                <div class="error-state empty-state">
                    <i class="material-icons" style="color:var(--danger)">error_outline</i>
                    <p><strong>${TaskM.t('detail.missingTitle')}</strong></p>
                    <p>${TaskM.t('detail.missingDesc')}</p>
                </div>`;
            return;
        }
        renderDetail(data.task, data.commits || []);
    } catch (e) {
        document.getElementById('detailContainer').innerHTML = `
            <div class="error-state empty-state">
                <i class="material-icons" style="color:var(--danger)">error_outline</i>
                <p><strong>${TaskM.t('common.loadFailed')}</strong></p>
                <p>${TaskM.t('common.refreshAndRetry')}</p>
            </div>`;
    }
}

function renderDetail(task, commits) {
    const tags = Array.isArray(task.tags) ? task.tags : [];
    const progress = parseInt(task.progress, 10) || 0;
    const completedBadge = task.is_completed == 1
        ? `<span class="chip completed"><i class="material-icons" style="font-size:14px">check</i>${TaskM.t('common.taskStatusCompleted')}</span>`
        : '';
    const tagHtml = tags.map((tag) => `<span class="chip tag">${escHtml(tag)}</span>`).join('');
    const categoryHtml = task.category ? `<span class="chip">${escHtml(task.category)}</span>` : '';
    const ddlHtml = task.ddl ? `<span class="chip tag" style="${ddlClass(task.ddl)}">DDL ${formatDate(task.ddl)}</span>` : '';
    const timelineHtml = commits.length
        ? commits.map(renderCommit).join('')
        : `<div class="empty-state" style="padding:24px 0 12px"><p><strong>${TaskM.t('common.noCommitYet')}</strong></p><p>${TaskM.t('common.todayProgressWillAppearHere')}</p></div>`;
    
    const hasCommitToday = commits.some(commit => {
        const commitDate = new Date(commit.created_at).toDateString();
        return commitDate === new Date().toDateString();
    });

    document.getElementById('detailContainer').innerHTML = `
        <a href="/pages/dashboard.html" class="back-link"><i class="material-icons">arrow_back</i>${TaskM.t('detail.backToDashboard')}</a>
        <section class="detail-card">
            <div class="detail-title-row">
                <h1 class="detail-title">${escHtml(task.title)}</h1>
                ${completedBadge}
                <button class="btn btn-danger btn-sm waves-effect" id="deleteTaskBtn" style="margin-left:auto"><i class="material-icons left">delete</i>${TaskM.t('detail.deleteTask')}</button>
            </div>
            <div class="task-chips">${categoryHtml}${tagHtml}${ddlHtml}</div>
            ${task.description ? `<p class="detail-desc">${escHtml(task.description)}</p>` : ''}
            <div class="progress-wrap">
                <div class="progress-label"><span>${TaskM.t('common.overallProgress')}</span><span>${progress}%</span></div>
                <div class="progress ${progress === 100 ? 'progress-100' : ''}">
                    <div class="determinate" style="width:${progress}%"></div>
                </div>
            </div>
        </section>
        <section class="timeline-card">
            <div class="page-toolbar" style="margin-bottom:14px">
                <div>
                    <h2 class="section-title timeline-title">${TaskM.t('detail.history')}</h2>
                    <p class="section-subtitle">${TaskM.t('common.recordCount', { count: commits.length })}</p>
                </div>
            </div>
            <ul class="timeline">${timelineHtml}</ul>
        </section>
        ${task.is_completed != 1 ? `
        <section class="detail-actions-panel">
            <div class="page-toolbar" style="margin-bottom:12px">
                <div>
                    <h2 class="section-title">${TaskM.t('detail.todayRecord')}</h2>
                    <p class="section-subtitle">${TaskM.t('detail.todayRecordDesc')}</p>
                </div>
            </div>
            <div style="text-align:center;padding:32px 0" id="todayActionInit">
                <i class="material-icons" style="font-size:48px;color:var(--primary);margin-bottom:12px">edit_note</i>
                <p style="color:var(--text-muted);margin-bottom:16px">${hasCommitToday ? TaskM.t('detail.hasRecordToday') : TaskM.t('detail.noRecordToday')}</p>
                <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
                    <button class="btn btn-outline waves-effect" id="showCompletedBtn"><i class="material-icons left">check_circle</i>${TaskM.t('myday.completed')}</button>
                    <button class="btn btn-primary waves-effect" id="showFollowUpBtn"><i class="material-icons left">trending_up</i>${TaskM.t('myday.followUp')}</button>
                </div>
            </div>
            <div id="todayPanelWrap" style="display:none">
                <div class="panel-tabs">
                    <button class="panel-tab" data-panel="completed">${TaskM.t('myday.completed')}</button>
                    <button class="panel-tab active" data-panel="follow_up">${TaskM.t('myday.followUp')}</button>
                </div>
                <div class="panel-content" id="panelCompleted">
                    <textarea class="myday-textarea" id="completedContent" placeholder="${escAttr(TaskM.t('detail.completedPlaceholder'))}"></textarea>
                    <div class="panel-actions">
                        <button class="btn btn-primary waves-effect" id="submitCompleted">${TaskM.t('detail.submitCompleted')}</button>
                    </div>
                </div>
                <div class="panel-content active" id="panelFollowUp">
                    <textarea class="myday-textarea" id="followUpContent" placeholder="${escAttr(TaskM.t('detail.followUpPlaceholder'))}"></textarea>
                    <div class="progress-input-row">
                        <label for="followUpRange">${TaskM.t('common.overallProgress')}</label>
                        <input type="range" id="followUpRange" min="0" max="100" value="${progress}" step="1">
                        <input type="number" id="followUpNum" min="0" max="100" value="${progress}">
                        <span style="color:var(--text-muted)">%</span>
                    </div>
                    <div class="panel-actions">
                        <button class="btn btn-primary waves-effect" id="submitFollowUp">${TaskM.t('detail.submitFollowUp')}</button>
                    </div>
                </div>
            </div>
        </section>` : ''}`;

    document.getElementById('showCompletedBtn')?.addEventListener('click', () => {
        document.getElementById('todayActionInit').style.display = 'none';
        document.getElementById('todayPanelWrap').style.display = 'block';
        document.querySelectorAll('.panel-tab').forEach(item => item.classList.remove('active'));
        document.querySelectorAll('.panel-content').forEach(item => item.classList.remove('active'));
        document.querySelector('[data-panel="completed"]')?.classList.add('active');
        document.getElementById('panelCompleted')?.classList.add('active');
    });

    document.getElementById('showFollowUpBtn')?.addEventListener('click', () => {
        document.getElementById('todayActionInit').style.display = 'none';
        document.getElementById('todayPanelWrap').style.display = 'block';
        document.querySelectorAll('.panel-tab').forEach(item => item.classList.remove('active'));
        document.querySelectorAll('.panel-content').forEach(item => item.classList.remove('active'));
        document.querySelector('[data-panel="follow_up"]')?.classList.add('active');
        document.getElementById('panelFollowUp')?.classList.add('active');
    });

    document.querySelectorAll('.panel-tab').forEach((tab) => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.panel-tab').forEach((item) => item.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach((item) => item.classList.remove('active'));
            tab.classList.add('active');
            const panelId = tab.dataset.panel === 'completed' ? 'panelCompleted' : 'panelFollowUp';
            document.getElementById(panelId)?.classList.add('active');
        });
    });

    document.getElementById('followUpRange')?.addEventListener('input', (e) => {
        document.getElementById('followUpNum').value = e.target.value;
    });

    document.getElementById('followUpNum')?.addEventListener('input', (e) => {
        const value = Math.max(0, Math.min(100, parseInt(e.target.value, 10) || 0));
        e.target.value = value;
        document.getElementById('followUpRange').value = value;
    });

    document.getElementById('submitCompleted')?.addEventListener('click', () => {
        const content = document.getElementById('completedContent').value.trim();
        submitCommit('completed', content, 100);
    });

    document.getElementById('submitFollowUp')?.addEventListener('click', () => {
        const content = document.getElementById('followUpContent').value.trim();
        const progressValue = parseInt(document.getElementById('followUpNum').value, 10) || 0;
        submitCommit('follow_up', content, progressValue);
    });

    document.getElementById('deleteTaskBtn')?.addEventListener('click', () => {
        const modal = document.getElementById('deleteModal');
        if (modal) modal.style.display = 'flex';
    });

    document.getElementById('cancelDeleteBtn')?.addEventListener('click', () => {
        const modal = document.getElementById('deleteModal');
        if (modal) modal.style.display = 'none';
    });

    document.getElementById('confirmDeleteBtn')?.addEventListener('click', deleteTask);
}

function renderCommit(commit) {
    return `
        <li class="timeline-item">
            <div class="timeline-dot dot-${commit.type}">
                <i class="material-icons" style="font-size:16px">${commitTypeIcon(commit.type)}</i>
            </div>
            <div class="timeline-body">
                <div class="tl-header">
                    <span class="chip ${commit.type === 'completed' ? 'completed' : ''}">${commitTypeLabel(commit.type)}</span>
                    <span class="tl-date">${formatDatetime(commit.created_at)}</span>
                </div>
                ${commit.content ? `<div class="tl-content">${escHtml(commit.content)}</div>` : ''}
                <div class="tl-progress">${TaskM.t('common.progressValue', { progress: commit.progress })}</div>
            </div>
        </li>`;
}

async function submitCommit(type, content, progress) {
    const btn = type === 'completed'
        ? document.getElementById('submitCompleted')
        : document.getElementById('submitFollowUp');
    if (btn) btn.disabled = true;

    try {
        const data = await apiPost('/api/commits/create.php', {
            task_id: TASK_ID,
            type,
            content,
            progress
        });

        if (data.success) {
            showToast(type === 'completed' ? TaskM.t('commits.completedToast') : TaskM.t('commits.followUpToast'));
            await loadDetail();
        } else {
            showToast(data.error || TaskM.t('commits.submitFailed'));
            if (btn) btn.disabled = false;
        }
    } catch (e) {
        showToast(TaskM.t('common.networkRetry'));
        if (btn) btn.disabled = false;
    }
}

async function logout() {
    await apiPost('/api/auth/logout.php', {});
    window.location.href = '/pages/login.html';
}

async function deleteTask() {
    const btn = document.getElementById('confirmDeleteBtn');
    if (btn) btn.disabled = true;

    try {
        const data = await apiPost('/api/tasks/delete.php', { id: TASK_ID });

        if (data.success) {
            showToast(data.message || TaskM.t('detail.deleteSuccess'));
            setTimeout(() => {
                window.location.href = '/pages/dashboard.html';
            }, 500);
        } else {
            showToast(data.error || TaskM.t('detail.deleteFailed'));
            if (btn) btn.disabled = false;
        }
    } catch (e) {
        showToast(TaskM.t('common.networkRetry'));
        if (btn) btn.disabled = false;
    }
}

function escHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function escAttr(str) {
    return escHtml(str).replace(/'/g, '&#39;');
}
</script>
</body>
</html>
